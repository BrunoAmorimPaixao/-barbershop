<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbeiros | Barbershop</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments :: menu}"></div>
    <header class="hero">
        <h1>Barbeiros</h1>
        <p>Gerencie os profissionais e suas especialidades.</p>
    </header>

    <section class="grid">
        <form th:action="@{/barbers}" th:object="${barber}" method="post" class="card form-card">
            <h2>Novo barbeiro</h2>
            <label>Nome <input type="text" th:field="*{name}"></label>
            <label>Especialidade <textarea th:field="*{specialty}"></textarea></label>
            <button type="submit">Salvar</button>
        </form>

        <div class="card">
            <h2>Equipe</h2>
            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Especialidade</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${barbers}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.specialty}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
