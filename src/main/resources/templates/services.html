<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicos | Barbershop</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments :: menu}"></div>
    <header class="hero">
        <h1>Servicos</h1>
        <p>Configure corte, barba e combinacoes de atendimento.</p>
    </header>

    <section class="grid">
        <form th:action="@{/services}" th:object="${shopService}" method="post" class="card form-card">
            <h2>Novo servico</h2>
            <label>Nome <input type="text" th:field="*{name}"></label>
            <label>Tipo
                <select th:field="*{type}">
                    <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                </select>
            </label>
            <label>Preco <input type="number" step="0.01" th:field="*{price}"></label>
            <label>Duracao (minutos) <input type="number" th:field="*{durationMinutes}"></label>
            <button type="submit">Salvar</button>
        </form>

        <div class="card">
            <h2>Catalogo</h2>
            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Preco</th>
                    <th>Duracao</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${services}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.type}"></td>
                    <td th:text="${item.price}"></td>
                    <td th:text="${item.durationMinutes + ' min'}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
