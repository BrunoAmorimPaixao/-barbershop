<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | Barbershop</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="page">
    <div th:replace="~{fragments :: menu}"></div>
    <header class="hero">
        <h1>Clientes</h1>
        <p>Cadastre e acompanhe sua base de clientes.</p>
    </header>

    <section class="grid">
        <form th:action="@{/clients}" th:object="${client}" method="post" class="card form-card">
            <h2>Novo cliente</h2>
            <label>Nome <input type="text" th:field="*{name}"></label>
            <label>E-mail <input type="email" th:field="*{email}"></label>
            <label>Telefone <input type="text" th:field="*{phone}"></label>
            <button type="submit">Salvar</button>
        </form>

        <div class="card">
            <h2>Lista</h2>
            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${clients}">
                    <td th:text="${item.name}"></td>
                    <td th:text="${item.email}"></td>
                    <td th:text="${item.phone}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
